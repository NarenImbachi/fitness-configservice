spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fitness_user_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: ${DB_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: ${DB_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Configuración para el Cliente de Administración de Keycloak
keycloak:
  admin:
    server-url: http://localhost:8181
    realm: fitness-oauth2
    client-id: userservice-admin-client
    client-secret: WhpBwlozdFqLP087B9gh888r6a65szU7

server:
  port: ${PORT:8081}